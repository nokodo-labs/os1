[project]
name = "nokodo-ai"
version = "0.1.0"
description = "Core library for nokodo AI"
requires-python = ">=3.13"
dependencies = [ # library-only dependencies
    "anthropic>=0.75.0",
    "openai>=2.14.0",
    "pydantic[email]>=2.9.0",
]

[project.optional-dependencies]
api = [
    # Extra deps needed to run the FastAPI app
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic-settings>=2.5.0",
    "sqlalchemy>=2.0.35",
    "alembic>=1.13.3",
    "psycopg[binary]>=3.2.3",
    "python-multipart>=0.0.12",
    "authlib>=1.3.2",
    "argon2-cffi>=23.1.0",
    "python-dotenv>=1.0.1",
    "jinja2>=3.1.4",
	"httpx>=0.27.2",
]

dev = [
    "pytest>=8.3.3",
    "pytest-sugar>=1.1.1",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-xdist>=3.5.0",
    "httpx>=0.27.2",
    "ruff>=0.7.3",
    "mypy>=1.13.0",
]

[build-system]
requires = ["setuptools>=75.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["nokodo_ai", "nokodo_ai.*"]
exclude = ["api", "api.*", "tests", "tests.*", "*.tests", "*.tests.*"]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = [
	"E",   # pycodestyle errors
	"F",   # pyflakes
	"I",   # isort (import sorting)
	"N",   # pep8-naming
	"W",   # pycodestyle warnings
	"UP",  # pyupgrade
]
ignore = [
    "W191",  # allow tabs for indentation
]

[tool.ruff.format]
quote-style = "double"
indent-style = "tab"
line-ending = "lf"

[tool.ruff.lint.isort]
force-single-line = false
lines-after-imports = 2

[tool.coverage.run]
source = ["api", "nokodo_ai"]
branch = true
concurrency = ["greenlet"]
data_file = "data/.coverage"
omit = [
    "*/tests/*",
    "tests/*",
    "api/tests/*",
]

[tool.coverage.html]
directory = "data/htmlcov"

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
