[pytest]
testpaths = api/tests nokodo_ai/tests tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
addopts =
    -v
    -x
    -n auto
    --maxprocesses=28
    --strict-markers
    --tb=short
    --cov=api
    --cov=nokodo_ai
    --cov-report=term-missing
    --cov-report=html
markers =
    asyncio: mark test as async
	integration: mark test as requiring external deps
