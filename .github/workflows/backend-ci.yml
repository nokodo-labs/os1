name: backend CI

on:
  workflow_call:
    inputs:
      run_tests:
        type: boolean
        description: "run tests"
        required: false
        default: true
      run_lint:
        type: boolean
        description: "run linting"
        required: false
        default: true
      run_type_check:
        type: boolean
        description: "run type checking"
        required: false
        default: true
  workflow_dispatch:
    inputs:
      run_tests:
        description: "run tests"
        type: boolean
        required: false
        default: true
      run_lint:
        description: "run linting"
        type: boolean
        required: false
        default: true
      run_type_check:
        description: "run type checking"
        type: boolean
        required: false
        default: true

jobs:
  quality:
    name: lint and test on Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8
        ports:
          - 6380:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        python:
          - file
          - "3.15"
    continue-on-error: ${{ matrix.python != 'file' }}
    defaults:
      run:
        shell: bash
        working-directory: backend
    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
      QDRANT_URL: ":memory:"
    steps:
      - uses: actions/checkout@v6

      - name: set up Python (from file)
        if: ${{ matrix.python == 'file' }}
        uses: actions/setup-python@v6
        with:
          python-version-file: backend/.python-version

      - name: set up Python (explicit)
        if: ${{ matrix.python != 'file' }}
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python }}"
          allow-prereleases: true

      - name: set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: install dependencies
        run: |
          echo "running on Python ${{ matrix.python }}"
          uv sync --frozen --all-extras

      - name: check code formatting
        run: uv run ruff format --check .

      - name: check import sorting
        run: uv run ruff check . --select I --no-fix --output-format=github

      - name: lint code
        if: ${{ inputs.run_lint }}
        run: uv run ruff check . --output-format=github

      - name: type check code
        if: ${{ inputs.run_type_check }}
        run: uv run ty check . ../tools/autogen-migration.py ../tools/export-openapi.py --output-format=github

      - name: run tests
        if: ${{ inputs.run_tests }}
        run: uv run pytest -v
