name: Backend CI

on:
  workflow_call:
    inputs:
      run_tests:
        type: boolean
        description: "run tests"
        required: false
        default: true
      run_lint:
        type: boolean
        description: "run linting"
        required: false
        default: true
  workflow_dispatch:
    inputs:
      run_tests:
        description: "run tests"
        type: boolean
        required: false
        default: true
      run_lint:
        description: "run linting"
        type: boolean
        required: false
        default: true

jobs:
  format:
    name: Check Formatting
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: backend/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --frozen --extra dev

      - name: Check Code Formatting
        run: uv run ruff format --check .

      - name: Check Import Sorting
        run: uv run ruff check . --select I --no-fix --output-format=github

  quality:
    name: Lint and Test on Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    needs: format
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        python:
          - file
          - "3.14.x"
    continue-on-error: ${{ matrix.python != 'file' }}
    defaults:
      run:
        shell: bash
        working-directory: backend
    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
      QDRANT_URL: ":memory:"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python (from file)
        if: ${{ matrix.python == 'file' }}
        uses: actions/setup-python@v6
        with:
          python-version-file: backend/.python-version

      - name: Set up Python (explicit)
        if: ${{ matrix.python != 'file' }}
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python }}"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          echo "Running on Python ${{ matrix.python }}"
          uv sync --frozen --all-extras

      - name: Lint Code
        if: ${{ inputs.run_lint }}
        run: uv run ruff check . --output-format=github

      - name: Run Tests
        if: ${{ inputs.run_tests }}
        run: uv run pytest -v
