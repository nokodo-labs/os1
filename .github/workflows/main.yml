name: main CI/CD pipeline

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [dev, stable]
  workflow_dispatch:

jobs:
  detect-changes:
    name: detect changes
    runs-on: ubuntu-latest
    # case 1: PR from non-core branch → core branch (dev/stable): Run CI
    # case 2: PR from core branch (dev/stable) → any branch: Skip (same repo only)
    # case 3: Push to core branch → Run CI + CD
    if: ${{ github.event_name != 'pull_request' || (!github.event.pull_request.draft && (github.event.pull_request.head.repo.full_name != github.repository || (github.head_ref != 'dev' && github.head_ref != 'stable' && !startsWith(github.head_ref, 'release/')))) }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      console: ${{ steps.changes.outputs.console }}
      docker: ${{ steps.changes.outputs.docker }}
      docker_ci_workflow: ${{ steps.changes.outputs.docker_ci_workflow }}
      backend_ci_workflow: ${{ steps.changes.outputs.backend_ci_workflow }}
      frontend_ci_workflow: ${{ steps.changes.outputs.frontend_ci_workflow }}
      console_ci_workflow: ${{ steps.changes.outputs.console_ci_workflow }}
      shared_workflows: ${{ steps.changes.outputs.shared_workflows }}
      docs: ${{ steps.changes.outputs.docs }}
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: detect changes
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            console:
              - 'console/**'
            docker:
              - '.docker/**'
            docker_ci_workflow:
              - '.github/workflows/docker-publish.yml'
            backend_ci_workflow:
              - '.github/workflows/backend-ci.yml'
            frontend_ci_workflow:
              - '.github/workflows/frontend-ci.yml'
              - '.github/workflows/deploy-frontend-pages.yml'
            console_ci_workflow:
              - '.github/workflows/console-ci.yml'
            shared_workflows:
              - '.github/workflows/main.yml'
              - '.github/workflows/release.yml'
              - '.github/workflows/promotion.yml'
              - '.github/workflows/docker-publish.yml'
            docs:
              - 'docs/**'
            release:
              - 'tools/release/**'

  # carryover gate: a component CI that failed must keep re-running in later
  # runs on the same branch until it passes again. the most recent run where
  # this gate decided (its job succeeded) is the single source of truth, since
  # every decided run already carries outstanding failures forward. runs where
  # the gate never decided (cancelled early, draft-skipped) ran no component CI
  # and are stepped over. if the current gate cannot decide (API errors) it
  # forces all components, re-anchoring the chain rather than laundering a fail.
  #
  # a component's outcome is read straight from its required CI leg. job names
  # are static and tied to project architecture, so coupling to them is fine:
  #   - `<component> CI / <required leg>` present => its conclusion is the truth
  #     (success => clear, anything else => force re-run)
  #   - absent => the component was skipped (no changes) => clear
  # only the required leg is read; the experimental continue-on-error matrix
  # legs (Python 3.15 / Node 25) are ignored, so they may fail freely.
  # if any of these job names change, update REQUIRED_LEG_* below to match.
  ci-carryover:
    name: carryover CI gate
    runs-on: ubuntu-latest
    needs: detect-changes
    permissions:
      actions: read
      contents: read
    outputs:
      force_backend: ${{ steps.check.outputs.force_backend }}
      force_frontend: ${{ steps.check.outputs.force_frontend }}
      force_console: ${{ steps.check.outputs.force_console }}
    steps:
      - name: check previous CI outcomes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # required CI leg names, prefixed by their main.yml caller job name.
          # the GitHub jobs API lists a reusable-workflow caller only when it is
          # skipped (as the bare name); when it runs, only these prefixed inner
          # jobs appear. keep these in sync with backend/frontend/console-ci.yml.
          REQUIRED_LEG_backend="backend ci / lint and test on python file"
          REQUIRED_LEG_frontend="frontend ci / check quality on node file"
          REQUIRED_LEG_console="console ci / check quality on node file"

          force_backend=false
          force_frontend=false
          force_console=false

          # the gate must always emit outputs and exit 0: a gate failure would
          # skip every component CI outright.
          finish() {
            echo "carryover: force_backend=${force_backend} force_frontend=${force_frontend} force_console=${force_console}"
            echo "force_backend=${force_backend}" >> "$GITHUB_OUTPUT"
            echo "force_frontend=${force_frontend}" >> "$GITHUB_OUTPUT"
            echo "force_console=${force_console}" >> "$GITHUB_OUTPUT"
            exit 0
          }

          # the carryover decision cannot be made: force everything so this run
          # records fresh outcomes for every component and re-anchors the
          # chain. one redundant full CI run beats laundering a failure.
          degrade() {
            echo "::warning::carryover gate degraded ($1): forcing all component CI"
            force_backend=true
            force_frontend=true
            force_console=true
            finish
          }

          # GitHub intentionally restricts access to the Actions API for `pull_request` workflows
          # coming from forks, and returns 404 even with correct requests.
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            is_fork_pr=$(jq -r '.pull_request.head.repo.full_name != .repository.full_name' "${GITHUB_EVENT_PATH}" 2>/dev/null || echo "false")
            if [ "${is_fork_pr}" = "true" ]; then
              finish
            fi
          fi

          branch=$(printf "%s" "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" | tr -d '\r')
          current_run_id=$(printf "%s" "${GITHUB_RUN_ID}" | tr -d '\r')
          repo=$(printf "%s" "${GITHUB_REPOSITORY}" | tr -d '\r')

          if ! echo "${current_run_id}" | grep -Eq '^[0-9]+$'; then
            degrade "unexpected run id '${current_run_id}'"
          fi

          branch_q=$(jq -rn --arg v "${branch}" '$v|@uri')

          workflow_id=$(gh api "repos/${repo}/actions/runs/${current_run_id}" --jq '.workflow_id' 2>/dev/null | tr -d '\r' || true)
          if ! echo "${workflow_id}" | grep -Eq '^[0-9]+$'; then
            degrade "could not resolve workflow id"
          fi

          # newest-first completed runs of this workflow on this branch
          runs_json=$(gh api "repos/${repo}/actions/workflows/${workflow_id}/runs?branch=${branch_q}&status=completed&per_page=20" 2>/dev/null || true)
          if [ -z "${runs_json}" ]; then
            degrade "could not list previous runs"
          fi

          # exclude the current run, and exclude fork runs: the branch filter
          # above matches head_branch across repos, so a fork branch named like
          # ours would otherwise pollute this branch's chain.
          run_ids=$(jq -r --argjson current "${current_run_id}" --arg repo "${repo}" \
            '.workflow_runs[]? | select(.id != $current) | select((.head_repository.full_name // $repo) == $repo) | .id' \
            <<<"${runs_json}" 2>/dev/null || true)

          # fresh branch with no history: nothing to carry over
          if [ -z "${run_ids}" ]; then
            finish
          fi

          gate_decided() {
            jq -r '[.jobs[]? | select(((.name // "") | ascii_downcase) == "carryover ci gate") | .conclusion] | first == "success"' \
              <<<"$1" 2>/dev/null || echo "false"
          }

          # required leg present => its conclusion decides (success => clear,
          # anything else => force). absent => component was skipped (no
          # changes) => clear. experimental legs are never inspected.
          component_state() {
            local jobs_json="$1"
            local leg_name="$2"
            jq -r --arg name "${leg_name}" '
              ([.jobs[]? | select(((.name // "") | ascii_downcase) == $name) | .conclusion // ""] | first) as $c
              | if $c == null or $c == "" or $c == "skipped" then "clear"
                elif $c == "success" then "clear"
                else "force"
                end
            ' <<<"${jobs_json}" 2>/dev/null || echo "force"
          }

          while IFS= read -r run_id; do
            if ! echo "${run_id}" | grep -Eq '^[0-9]+$'; then
              continue
            fi

            jobs_json=$(gh api "repos/${repo}/actions/runs/${run_id}/jobs?per_page=100" </dev/null 2>/dev/null || true)
            if [ -z "${jobs_json}" ]; then
              degrade "could not list jobs for run ${run_id}"
            fi

            if [ "$(gate_decided "${jobs_json}")" != "true" ]; then
              echo "run ${run_id}: carryover gate did not decide, stepping over"
              continue
            fi

            backend_state=$(component_state "${jobs_json}" "${REQUIRED_LEG_backend}")
            frontend_state=$(component_state "${jobs_json}" "${REQUIRED_LEG_frontend}")
            console_state=$(component_state "${jobs_json}" "${REQUIRED_LEG_console}")
            echo "carrying over from run ${run_id}: backend=${backend_state} frontend=${frontend_state} console=${console_state}"

            if [ "${backend_state}" = "force" ]; then force_backend=true; fi
            if [ "${frontend_state}" = "force" ]; then force_frontend=true; fi
            if [ "${console_state}" = "force" ]; then force_console=true; fi

            finish
          done <<< "${run_ids}"

          # recent history contains only runs where the gate never decided;
          # those runs ran no component CI, so there is nothing to carry over.
          finish

  backend-ci:
    name: backend CI
    needs: [detect-changes, ci-carryover]
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.backend_ci_workflow == 'true' || needs.ci-carryover.outputs.force_backend == 'true'
    uses: ./.github/workflows/backend-ci.yml
    with:
      run_tests: true
      run_lint: true
      run_type_check: true
    secrets: inherit

  frontend-ci:
    name: frontend CI
    needs: [detect-changes, ci-carryover]
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.frontend_ci_workflow == 'true' || needs.ci-carryover.outputs.force_frontend == 'true'
    uses: ./.github/workflows/frontend-ci.yml
    with:
      run_tests: true
      run_lint: true
    secrets: inherit

  console-ci:
    name: console CI
    needs: [detect-changes, ci-carryover]
    if: needs.detect-changes.outputs.console == 'true' || needs.detect-changes.outputs.console_ci_workflow == 'true' || needs.ci-carryover.outputs.force_console == 'true'
    uses: ./.github/workflows/console-ci.yml
    with:
      run_tests: true
      run_lint: false
    secrets: inherit

  release:
    name: release
    needs: [backend-ci, frontend-ci, console-ci]
    if: ${{ !cancelled() && (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') && (needs.console-ci.result == 'success' || needs.console-ci.result == 'skipped') && (github.ref_name == 'dev' || github.ref_name == 'stable') && github.event_name == 'push' }}
    uses: ./.github/workflows/release.yml
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
      packages: write

  promotion:
    name: code promotion
    needs: [detect-changes, backend-ci, frontend-ci, console-ci]
    if: ${{ !cancelled() && github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == 'dev' && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.console == 'true' || needs.detect-changes.outputs.docs == 'true') && ((needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') && (needs.console-ci.result == 'success' || needs.console-ci.result == 'skipped')) }}
    uses: ./.github/workflows/promotion.yml
    secrets: inherit

  pages-deploy:
    name: deploy frontend to GitHub Pages
    needs: [detect-changes, frontend-ci]
    if: ${{ !cancelled() && (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.frontend_ci_workflow == 'true') && github.event_name == 'push' && github.ref_name == 'stable' }}
    uses: ./.github/workflows/deploy-frontend-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write
    secrets: inherit
    with:
      environment: github-pages

  docker-publish:
    name: build and publish Docker image
    needs: [detect-changes, backend-ci, frontend-ci, console-ci, release]
    permissions:
      contents: read
      packages: write
    if: ${{ !cancelled() && (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') && (needs.console-ci.result == 'success' || needs.console-ci.result == 'skipped') && github.event_name == 'push' && github.ref_type == 'branch' && (github.ref_name == 'dev' || github.ref_name == 'stable') && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.console == 'true' || needs.detect-changes.outputs.docker == 'true' || needs.detect-changes.outputs.docker_ci_workflow == 'true' || needs.release.outputs.release_created == 'true') }}
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    with:
      release_version: ${{ needs.release.outputs.version }}
      component_tags: ${{ needs.release.outputs.component_tags }}
