name: main CI/CD pipeline

on:
  pull_request:
    branches: [dev, stable]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [dev, stable]
  workflow_dispatch:

jobs:
  detect-changes:
    name: detect changes
    runs-on: ubuntu-latest
    # case 1: PR from non-core branch → core branch (dev/stable): Run CI
    # case 2: PR from core branch (dev/stable) → any branch: Skip (same repo only)
    # case 3: Push to core branch → Run CI + CD
    if: ${{ github.event_name != 'pull_request' || (!github.event.pull_request.draft && (github.event.pull_request.head.repo.full_name != github.repository || (github.head_ref != 'dev' && github.head_ref != 'stable'))) }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      console: ${{ steps.changes.outputs.console }}
      docker: ${{ steps.changes.outputs.docker }}
      github_actions: ${{ steps.changes.outputs.github_actions }}
      docs: ${{ steps.changes.outputs.docs }}
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            console:
              - 'console/**'
            docker:
              - '.docker/**'
            github_actions:
              - '.github/workflows/**'
            docs:
              - 'docs/**'
            release:
              - 'tools/release_please/**'

  ci-carryover:
    name: carryover CI gate
    runs-on: ubuntu-latest
    needs: detect-changes
    permissions:
      actions: read
      contents: read
    outputs:
      force_backend: ${{ steps.check.outputs.force_backend }}
      force_frontend: ${{ steps.check.outputs.force_frontend }}
      force_console: ${{ steps.check.outputs.force_console }}
    steps:
      - name: check previous CI outcomes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          BACKEND_CHANGED: ${{ needs.detect-changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.detect-changes.outputs.frontend }}
          CONSOLE_CHANGED: ${{ needs.detect-changes.outputs.console }}
          GITHUB_ACTIONS_CHANGED: ${{ needs.detect-changes.outputs.github_actions }}
        run: |
          set -euo pipefail

          force_backend=false
          force_frontend=false
          force_console=false

          # if workflows changed, the component jobs will run anyway.
          if [ "${GITHUB_ACTIONS_CHANGED}" = "true" ]; then
            echo "force_backend=false" >> "$GITHUB_OUTPUT"
            echo "force_frontend=false" >> "$GITHUB_OUTPUT"
            echo "force_console=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # GitHub intentionally restricts access to the Actions API for `pull_request` workflows
          # coming from forks, and returns 404 even with correct requests.
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            is_fork_pr=$(jq -r '.pull_request.head.repo.full_name != .repository.full_name' "${GITHUB_EVENT_PATH}" 2>/dev/null || echo "false")
            if [ "${is_fork_pr}" = "true" ]; then
              echo "force_backend=false" >> "$GITHUB_OUTPUT"
              echo "force_frontend=false" >> "$GITHUB_OUTPUT"
              echo "force_console=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          branch=$(printf "%s" "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" | tr -d '\r')
          current_run_id=$(printf "%s" "${GITHUB_RUN_ID}" | tr -d '\r')
          repo=$(printf "%s" "${GITHUB_REPOSITORY}" | tr -d '\r')

          branch_q=$(jq -rn --arg v "${branch}" '$v|@uri')

          workflow_id=$(gh api "repos/${repo}/actions/runs/${current_run_id}" --jq '.workflow_id' | tr -d '\r') 
          if ! echo "${workflow_id}" | grep -Eq '^[0-9]+$'; then
            echo "unexpected workflow_id: ${workflow_id}" >&2
            exit 1
          fi

          previous_run_id=$(gh api "repos/${repo}/actions/workflows/${workflow_id}/runs?branch=${branch_q}&status=completed&per_page=10" \
            --jq ".workflow_runs | map(select(.id != ${current_run_id})) | first | .id // empty" \
            | tr -d '\r')

          if [ -z "${previous_run_id}" ]; then
            echo "force_backend=false" >> "$GITHUB_OUTPUT"
            echo "force_frontend=false" >> "$GITHUB_OUTPUT"
            echo "force_console=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! echo "${previous_run_id}" | grep -Eq '^[0-9]+$'; then
            echo "unexpected previous_run_id: ${previous_run_id}" >&2
            exit 1
          fi

          job_conclusion() {
            local job_name="$1"
            gh api "repos/${repo}/actions/runs/${previous_run_id}/jobs?per_page=100" \
              --jq ".jobs[] | select((.name | ascii_downcase) == (\"${job_name}\" | ascii_downcase)) | .conclusion" \
              | head -n 1 || true
          }

          is_failed_conclusion() {
            case "$1" in
              failure|cancelled|timed_out|action_required)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          backend_prev=$(job_conclusion "backend CI")
          frontend_prev=$(job_conclusion "frontend CI")
          console_prev=$(job_conclusion "console CI")

          if [ "${BACKEND_CHANGED}" != "true" ] && is_failed_conclusion "${backend_prev}"; then
            force_backend=true
          fi

          if [ "${FRONTEND_CHANGED}" != "true" ] && is_failed_conclusion "${frontend_prev}"; then
            force_frontend=true
          fi

          if [ "${CONSOLE_CHANGED}" != "true" ] && is_failed_conclusion "${console_prev}"; then
            force_console=true
          fi

          echo "force_backend=${force_backend}" >> "$GITHUB_OUTPUT"
          echo "force_frontend=${force_frontend}" >> "$GITHUB_OUTPUT"
          echo "force_console=${force_console}" >> "$GITHUB_OUTPUT"

  backend-ci:
    name: backend CI
    needs: [detect-changes, ci-carryover]
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.github_actions == 'true' || needs.ci-carryover.outputs.force_backend == 'true'
    uses: ./.github/workflows/backend-ci.yml
    with:
      run_tests: true
      run_lint: true
    secrets: inherit

  frontend-ci:
    name: frontend CI
    needs: [detect-changes, ci-carryover]
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.github_actions == 'true' || needs.ci-carryover.outputs.force_frontend == 'true'
    uses: ./.github/workflows/frontend-ci.yml
    with:
      run_tests: true
      run_lint: true
    secrets: inherit

  console-ci:
    name: console CI
    needs: [detect-changes, ci-carryover]
    if: needs.detect-changes.outputs.console == 'true' || needs.detect-changes.outputs.github_actions == 'true' || needs.ci-carryover.outputs.force_console == 'true'
    uses: ./.github/workflows/console-ci.yml
    with:
      run_tests: true
      run_lint: true
    secrets: inherit

  release:
    name: release
    needs: [backend-ci, frontend-ci, console-ci]
    if: ${{ !cancelled() && (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') && (needs.console-ci.result == 'success' || needs.console-ci.result == 'skipped') && (github.ref_name == 'dev' || github.ref_name == 'stable') && github.event_name == 'push' }}
    uses: ./.github/workflows/release.yml
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
      packages: write

  promotion:
    name: code promotion
    needs: [detect-changes, backend-ci, frontend-ci, console-ci]
    if: ${{ !cancelled() && github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == 'dev' && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.console == 'true' || needs.detect-changes.outputs.github_actions == 'true' || needs.detect-changes.outputs.docs == 'true') && ((needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') && (needs.console-ci.result == 'success' || needs.console-ci.result == 'skipped')) }}
    uses: ./.github/workflows/promotion.yml
    secrets: inherit

  pages-deploy:
    name: deploy frontend to GitHub Pages
    needs: [detect-changes, frontend-ci]
    if: ${{ !cancelled() && (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.github_actions == 'true') && github.event_name == 'push' && github.ref_name == 'stable' }}
    uses: ./.github/workflows/deploy-frontend-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write
    secrets: inherit
    with:
      environment: github-pages

  docker-publish:
    name: build and publish Docker image
    needs: [detect-changes, backend-ci, frontend-ci, console-ci, release]
    permissions:
      contents: read
      packages: write
    if: ${{ !cancelled() && (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') && (needs.console-ci.result == 'success' || needs.console-ci.result == 'skipped') && github.event_name == 'push' && github.ref_type == 'branch' && (github.ref_name == 'dev' || github.ref_name == 'stable') && ((needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.console == 'true' || needs.detect-changes.outputs.docker == 'true' || needs.detect-changes.outputs.github_actions == 'true') || needs.release.outputs.version != '') }}
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    with:
      release_version: ${{ needs.release.outputs.version }}
