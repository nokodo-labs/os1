name: release

on:
  workflow_call:
    outputs:
      pr_created:
        value: ${{ jobs.release.outputs.pr_created }}
      release_created:
        value: ${{ jobs.release.outputs.release_created }}
      tag_name:
        value: ${{ jobs.release.outputs.tag_name }}
      version:
        value: ${{ jobs.release.outputs.version }}
      component_tags:
        value: ${{ jobs.release.outputs.component_tags }}
  workflow_dispatch:
    inputs:
      release_as:
        description: "manual version override (e.g. 1.2.3 or 1.0.0-rc.0). bypasses auto-computed version."
        required: false
        type: string

jobs:
  release:
    name: manage release
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr_created: ${{ steps.release.outputs.pr_created }}
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      component_tags: ${{ steps.release.outputs.component_tags }}

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: install release tooling
        working-directory: tools/release
        run: npm ci

      - name: run release
        id: release
        working-directory: tools/release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          RELEASE_AS: ${{ inputs.release_as }}
        run: node src/release.mjs

  # when triggered manually (outside main CI), run docker-publish
  # so released versions get their container images tagged.
  docker-publish:
    name: publish Docker images
    needs: release
    if: ${{ github.event_name == 'workflow_dispatch' && needs.release.outputs.release_created == 'true' }}
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
    with:
      release_version: ${{ needs.release.outputs.version }}
      component_tags: ${{ needs.release.outputs.component_tags }}
