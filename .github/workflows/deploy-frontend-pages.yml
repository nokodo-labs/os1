name: deploy frontend to GitHub Pages

on:
  workflow_call:
    inputs:
      vite_api_url:
        description: "API URL to embed at build time (optional)"
        required: false
        type: string
        default: ""
      environment:
        description: "deployment environment name"
        required: false
        type: string
        default: "github-pages"
    secrets: {}
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: build
        env:
          VITE_API_URL: ${{ inputs.vite_api_url || '' }}
          VITE_PAGES: "true"
        run: pnpm run build

      - name: upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: comment PR with preview URL
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v9
        with:
          script: |
            const url = core.getInput('url') || (process.env.DEPLOY_URL || '${{ steps.deployment.outputs.page_url }}');
            const body = `🚀 preview deployed to: ${url}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
