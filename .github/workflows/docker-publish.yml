name: build and publish Docker images

on:
  workflow_call:
    inputs:
      release_version:
        type: string
        description: "release version if a release happened (empty = no release)"
        required: false
        default: ""
      component_tags:
        type: string
        description: 'JSON map of component name to version (e.g. {"frontend":"0.2.0"})'
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      release_tag:
        description: "the tag of the release"
        required: false
        default: "test-release"
      python-version:
        type: string
        description: "Python version to use for the backend build"
        required: false
        default: ""

jobs:
  build-and-push:
    name: build and push container images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: set Python version
        id: set_python_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.python-version }}" ]; then
            echo "PYTHON_VERSION=${{ github.event.inputs.python-version }}" >> $GITHUB_OUTPUT
          elif [ -f backend/.python-version ]; then
            ver=$(cat backend/.python-version | tr -d '\r' | head -n1)
            echo "PYTHON_VERSION=$ver" >> $GITHUB_OUTPUT
          else
            echo "error: backend/.python-version not found and no input provided" >&2
            exit 1
          fi

      - name: set branch and commit info
        id: set_branch_info
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BRANCH_NAME=manual" >> $GITHUB_OUTPUT
            echo "COMMIT_SHA=manual" >> $GITHUB_OUTPUT
          else
            echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            short_sha="${{ github.sha }}"
            echo "COMMIT_SHA=${short_sha:0:7}" >> $GITHUB_OUTPUT
          fi

      - name: log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set base image registry
        id: set_registry
        run: |
          BASE=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[A-Z]' '[a-z]')
          echo "BASE=$BASE" >> $GITHUB_OUTPUT

      - name: determine tags suffix list
        id: determine_tags
        run: |
          BRANCH_NAME="${{ steps.set_branch_info.outputs.BRANCH_NAME }}"
          COMMIT_SHA="${{ steps.set_branch_info.outputs.COMMIT_SHA }}"
          RELEASE_VERSION="${{ inputs.release_version }}"

          # build a space-separated list of tag suffixes (applied to each service image)
          SUFFIXES=""

          if [ "$COMMIT_SHA" != "manual" ]; then
            SUFFIXES="$SUFFIXES $COMMIT_SHA"
          fi

          if [ "$BRANCH_NAME" = "production" ]; then
            SUFFIXES="$SUFFIXES latest"
          elif [ "$BRANCH_NAME" = "dev" ]; then
            SUFFIXES="$SUFFIXES dev"
          fi

          if [ -n "$RELEASE_VERSION" ]; then
            SUFFIXES="$SUFFIXES $RELEASE_VERSION"
            echo "adding release tag: $RELEASE_VERSION"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SUFFIXES="$SUFFIXES ${{ github.event.inputs.release_tag }}"
          fi

          echo "tag suffixes: $SUFFIXES"
          echo "SUFFIXES=$SUFFIXES" >> $GITHUB_OUTPUT

          # build per-service component version suffixes from release component_tags
          COMPONENT_TAGS='${{ inputs.component_tags }}'
          BACKEND_SUFFIXES=""
          FRONTEND_SUFFIXES=""
          CONSOLE_SUFFIXES=""
          if [ -n "$COMPONENT_TAGS" ] && [ "$COMPONENT_TAGS" != "{}" ]; then
            LIBRARY_VER=$(echo "$COMPONENT_TAGS" | jq -r '.library // empty')
            API_VER=$(echo "$COMPONENT_TAGS" | jq -r '.api // empty')
            FRONTEND_VER=$(echo "$COMPONENT_TAGS" | jq -r '.frontend // empty')
            CONSOLE_VER=$(echo "$COMPONENT_TAGS" | jq -r '.console // empty')
            if [ -n "$LIBRARY_VER" ]; then BACKEND_SUFFIXES="library-v$LIBRARY_VER"; fi
            if [ -n "$API_VER" ]; then BACKEND_SUFFIXES="$BACKEND_SUFFIXES api-v$API_VER"; fi
            if [ -n "$FRONTEND_VER" ]; then FRONTEND_SUFFIXES="frontend-v$FRONTEND_VER"; fi
            if [ -n "$CONSOLE_VER" ]; then CONSOLE_SUFFIXES="console-v$CONSOLE_VER"; fi
          fi
          echo "BACKEND_SUFFIXES=$BACKEND_SUFFIXES" >> $GITHUB_OUTPUT
          echo "FRONTEND_SUFFIXES=$FRONTEND_SUFFIXES" >> $GITHUB_OUTPUT
          echo "CONSOLE_SUFFIXES=$CONSOLE_SUFFIXES" >> $GITHUB_OUTPUT

      # --- backend ---

      - name: build backend
        run: |
          docker build backend \
            --file .docker/Dockerfile.backend \
            --tag os1-backend \
            --build-arg PYTHON_VERSION=${{ steps.set_python_version.outputs.PYTHON_VERSION }}

      - name: push backend
        run: |
          BASE="${{ steps.set_registry.outputs.BASE }}"
          for suffix in ${{ steps.determine_tags.outputs.SUFFIXES }}; do
            tag="$BASE/os1-backend:$suffix"
            echo "pushing $tag"
            docker tag os1-backend "$tag"
            docker push "$tag"
          done
          for suffix in ${{ steps.determine_tags.outputs.BACKEND_SUFFIXES }}; do
            tag="$BASE/os1-backend:$suffix"
            echo "pushing component tag $tag"
            docker tag os1-backend "$tag"
            docker push "$tag"
          done

      # --- frontend ---

      - name: build frontend
        run: |
          docker build frontend \
            --file .docker/Dockerfile.frontend \
            --tag os1-frontend

      - name: push frontend
        run: |
          BASE="${{ steps.set_registry.outputs.BASE }}"
          for suffix in ${{ steps.determine_tags.outputs.SUFFIXES }}; do
            tag="$BASE/os1-frontend:$suffix"
            echo "pushing $tag"
            docker tag os1-frontend "$tag"
            docker push "$tag"
          done
          for suffix in ${{ steps.determine_tags.outputs.FRONTEND_SUFFIXES }}; do
            tag="$BASE/os1-frontend:$suffix"
            echo "pushing component tag $tag"
            docker tag os1-frontend "$tag"
            docker push "$tag"
          done

      # --- console ---

      - name: build console
        run: |
          docker build console \
            --file .docker/Dockerfile.console \
            --tag os1-console

      - name: push console
        run: |
          BASE="${{ steps.set_registry.outputs.BASE }}"
          for suffix in ${{ steps.determine_tags.outputs.SUFFIXES }}; do
            tag="$BASE/os1-console:$suffix"
            echo "pushing $tag"
            docker tag os1-console "$tag"
            docker push "$tag"
          done
          for suffix in ${{ steps.determine_tags.outputs.CONSOLE_SUFFIXES }}; do
            tag="$BASE/os1-console:$suffix"
            echo "pushing component tag $tag"
            docker tag os1-console "$tag"
            docker push "$tag"
          done
