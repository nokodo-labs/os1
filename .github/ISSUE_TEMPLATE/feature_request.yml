name: feature request
description: suggest a new feature or enhancement
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        thanks for suggesting a feature! please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: problem statement
      description: what problem does this feature solve? is your feature request related to a problem?
      placeholder: i'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: proposed solution
      description: describe the solution you'd like
      placeholder: i'd like to see...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: component
      description: which part of the stack would this affect?
      options:
        - backend (FastAPI)
        - frontend (Svelte)
        - Docker/infrastructure
        - VS Code configuration
        - documentation
        - developer experience
        - other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: alternatives considered
      description: describe any alternative solutions or features you've considered
      placeholder: i also considered...
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: examples
      description: provide examples of similar features in other projects or mockups
      placeholder: links, code snippets, or screenshots
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: priority
      description: how important is this feature to you?
      options:
        - nice to have
        - would be helpful
        - important
        - critical
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: contribution
      description: would you be willing to contribute this feature?
      options:
        - label: i'd be willing to submit a PR for this feature
