name: bug report
description: report a bug or unexpected behavior
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        thanks for taking the time to report a bug! please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: description
      description: a clear and concise description of what the bug is.
      placeholder: what happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: steps to reproduce
      description: steps to reproduce the behavior
      placeholder: |
        1. go to '...'
        2. click on '...'
        3. see error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: expected behavior
      description: what you expected to happen
      placeholder: what should have happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: component
      description: which part of the stack is affected?
      options:
        - backend (FastAPI)
        - frontend (Svelte)
        - Docker/infrastructure
        - VS Code configuration
        - documentation
        - other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: environment
      description: |
        provide relevant environment details
      placeholder: |
        - OS: [e.g. Windows 11, macOS 14, Ubuntu 22.04]
        - Python version: [e.g. 3.13.1]
        - Node version: [e.g. 24.0.0]
        - Docker version: [e.g. 24.0.0]
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: logs/screenshots
      description: add any relevant logs, error messages, or screenshots
      placeholder: paste logs or drag images here
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: additional context
      description: any other context about the problem
    validations:
      required: false
