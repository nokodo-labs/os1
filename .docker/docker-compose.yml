services:
  db:
    image: postgres:17-alpine
    container_name: nokodo-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nokodo-ai-admin
      POSTGRES_PASSWORD: nokodo-ai
      POSTGRES_DB: nokodo-ai-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nokodo-ai-admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["deps", "local"]

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: nokodo-ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles: ["deps", "local"]

  backend:
    build:
      context: ../backend
      dockerfile: ../.docker/Dockerfile.backend
    container_name: nokodo-ai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://nokodo-ai-admin:nokodo-ai@db:5432/nokodo-ai-dev
      APP_ENV: dev
      DEBUG: "True"
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:888", "http://localhost:8383", "http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ../backend:/app
      - ../backend/data:/app/data
      - /app/__pycache__
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    profiles: ["local"]

  frontend:
    build:
      context: ../frontend
      dockerfile: ../.docker/Dockerfile.frontend
    container_name: nokodo-ai-frontend
    restart: unless-stopped
    ports:
      - "888:80"
    environment:
      API_ORIGIN: ${API_ORIGIN:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_started
    profiles: ["local"]

  console:
    build:
      context: ../console
      dockerfile: ../.docker/Dockerfile.console
    container_name: nokodo-ai-console
    restart: unless-stopped
    ports:
      - "8383:80"
    depends_on:
      backend:
        condition: service_started
    profiles: ["local"]

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  default:
    name: nokodo-network
