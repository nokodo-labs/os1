name: os1

x-backend-env: &backend-env
  DATABASE_URL: postgresql+psycopg://nokodo-ai-admin:nokodo-ai@db:5432/nokodo-ai-production
  ENV: production
  DEBUG: "false"
  JSON_LOGS: "true"
  NOKODO__SECURITY__SECRET_KEY: change-this-in-production
  NOKODO__SECURITY__CORS_ORIGINS: "https://app.yourdomain.com"
  NOKODO__BRANDING__PUBLIC_FRONTEND_ORIGIN: "https://app.yourdomain.com"
  NOKODO__CACHE__REDIS__URL: redis://valkey:6379/0

services:
  db:
    image: postgres:17-alpine
    container_name: os1-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nokodo-ai-admin
      POSTGRES_PASSWORD: nokodo-ai
      POSTGRES_DB: nokodo-ai-production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nokodo-ai-admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: os1-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  valkey:
    image: valkey/valkey:9-alpine
    container_name: os1-valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/nokodo-labs/os1-backend:latest
    container_name: os1-backend
    restart: unless-stopped
    ports:
      - "1383:1383"
    environment: *backend-env
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      valkey:
        condition: service_healthy
      taskiq-worker:
        condition: service_started
      taskiq-scheduler:
        condition: service_started
    volumes:
      - backend_data:/app/data

  taskiq-worker:
    image: ghcr.io/nokodo-labs/os1-backend:latest
    container_name: os1-taskiq-worker
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      valkey:
        condition: service_healthy
    volumes:
      - backend_data:/app/data
    command: python -m api.taskiq worker api.taskiq:broker api.tasks.registry
      --workers auto --max-async-tasks 25

  taskiq-scheduler:
    image: ghcr.io/nokodo-labs/os1-backend:latest
    container_name: os1-taskiq-scheduler
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      valkey:
        condition: service_healthy
    volumes:
      - backend_data:/app/data
    command: python -m api.taskiq scheduler api.taskiq:scheduler api.tasks.registry

  frontend:
    image: ghcr.io/nokodo-labs/os1-frontend:latest
    container_name: os1-frontend
    restart: unless-stopped
    ports:
      - "888:80"
    environment:
      API_ORIGIN: ${API_ORIGIN:-}
    depends_on:
      backend:
        condition: service_started

  console:
    image: ghcr.io/nokodo-labs/os1-console:latest
    container_name: os1-console
    restart: unless-stopped
    ports:
      - "8383:80"
    environment:
      API_ORIGIN: ${API_ORIGIN:-}
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  valkey_data:
    driver: local
  backend_data:
    driver: local

networks:
  default:
    name: os1-network
