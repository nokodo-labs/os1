services:
  db:
    image: postgres:17-alpine
    container_name: nokodo-ai-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nokodo-ai-admin
      POSTGRES_PASSWORD: nokodo-ai
      POSTGRES_DB: nokodo-ai-production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nokodo-ai-admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: nokodo-ai-prod-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    image: ghcr.io/nokodo-labs/os1-backend:latest
    container_name: nokodo-ai-prod-backend
    restart: unless-stopped
    ports:
      - "1383:1383"
    environment:
      DATABASE_URL: postgresql+psycopg://nokodo-ai-admin:nokodo-ai@db:5432/nokodo-ai-production
      ENV: production
      DEBUG: "false"
      JSON_LOGS: "true"
      NOKODO__SECURITY__SECRET_KEY: change-this-in-production
      NOKODO__SECURITY__CORS_ORIGINS: "https://app.yourdomain.com"
      NOKODO__BRANDING__PUBLIC_FRONTEND_ORIGIN: "https://app.yourdomain.com"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ../backend/data:/app/data

  frontend:
    image: ghcr.io/nokodo-labs/os1-frontend:latest
    container_name: nokodo-ai-prod-frontend
    restart: unless-stopped
    ports:
      - "888:80"
    environment:
      API_ORIGIN: ${API_ORIGIN:-}
    depends_on:
      backend:
        condition: service_started

  console:
    image: ghcr.io/nokodo-labs/os1-console:latest
    container_name: nokodo-ai-prod-console
    restart: unless-stopped
    ports:
      - "8383:80"
    environment:
      API_ORIGIN: ${API_ORIGIN:-}
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  default:
    name: nokodo-network
